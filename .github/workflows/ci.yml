name: OpsFlow CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Health Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opsflow
          POSTGRES_PASSWORD: opsflow_secret
          POSTGRES_DB: opsflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Lint client
        working-directory: client
        run: npm run lint

      - name: Run server unit tests
        working-directory: server
        run: npm test

      - name: Start server and run health check
        working-directory: server
        env:
          DATABASE_URL: postgresql://opsflow:opsflow_secret@localhost:5432/opsflow
          JWT_SECRET: ci_test_secret
          PORT: 5001
        run: |
          node server.js &
          SERVER_PID=$!
          sleep 5
          curl --fail http://localhost:5001/ || (kill $SERVER_PID && exit 1)
          kill $SERVER_PID

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: false
          tags: opsflow-server:ci

  java-analytics-build:
    name: Java Analytics Client Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build Java analytics client
        working-directory: analytics
        run: mvn package -DskipTests -q

  helm-validate:
    name: Helm Chart Validation
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint helm/opsflow

      - name: Render Helm templates
        run: helm template opsflow helm/opsflow

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-server
  labels:
    app: {{ .Release.Name }}-server
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-server
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-server
    spec:
      containers:
        - name: server
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.server.port }}
              name: http
            - containerPort: {{ .Values.server.grpcPort }}
              name: grpc
          env:
            - name: PORT
              value: "{{ .Values.server.port }}"
            - name: GRPC_PORT
              value: "{{ .Values.server.grpcPort }}"
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@{{ .Release.Name }}-postgres:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}"
            - name: JWT_SECRET
              value: "{{ .Values.server.env.jwtSecret }}"
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.server.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
